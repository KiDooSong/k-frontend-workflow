# project-layout.yaml — adoption-probe DRAFT (제안만 · 초안)
# ─────────────────────────────────────────────────────────────────────────────
# 이 파일은 adoption-probe 스킬이 산출하는 **초안**이다. 다음을 반드시 지킨다:
#   - 산출 위치 = 프로브 출력 디렉토리(temp/runs/adoption-probe-<id>/) — 소비 레포 루트에
#     이걸 그대로 떨궈 라이브 게이트에 배선하지 않는다(배선=사람 결정, 별 작업).
#   - Axis 1(role→glob 재바인딩)을 roles: 로 표현한다.
#   - Axis 2(repository/usecase/entity/data-source/mapper/view-model 등 추가 계층)는 layers: 로
#     readiness-access 선언한다. layout-profile/readiness 는 access allow/forbid 를 scratch 관찰에
#     반영하지만 validate/lint/CI/hard gate 에는 연결하지 않는다.
#   - 이 초안은 confirmed/OD/CI/소스 무엇도 바꾸지 않는다.
#
# 사용 흐름: 프로브가 소비 레포 구조를 스캔 → 아래 roles 의 placeholder 를 실제 glob 으로 채움 →
#           confidence 표기 → adoption-report 의 "Role Map(Axis 1)" 표와 1:1 대응.
# ─────────────────────────────────────────────────────────────────────────────
version: 1
preset: expo-feature        # 기준 프리셋(현 3계층 byte-동치). 소비 레포가 다른 프레임이면 비우고 roles 전부 명시.

# (Axis 1) role → 물리 glob 재바인딩. {domain} 토큰은 readiness per-screen 치환에서 펼쳐지므로 보존.
# 7개 내장 role 이 전부다 — 이 목록을 늘리면(예: view_model:) glob 이름표만 생기고 게이트 의미는 안 생긴다(F1).
roles:
  route_entry:      "src/app/**"        # 예: src/app/**            · confidence: see adoption-report · 근거: see adoption-report
  screen:           "src/presentation/{domain}/screens/**"       # 예: src/presentation/{domain}/screens/**
  domain_component: "src/presentation/{domain}/components/**"    # 예: src/presentation/{domain}/components/**
  hook:             "src/presentation/{domain}/viewmodels/**"         # 예: src/features/{domain}/hooks/**  (← 다층 레포에선 ViewModel 을 임시로 여기 평탄화)
  ui_primitive:     "src/components/ui/**"           # 예: src/components/ui/**  · catalog-gen --layout observation source
  api_client:       "src/api/**"   # 예: src/api/**
  api_schema:       "src/api/schemas/**"   # 예: src/api/schemas/**

# (선택) 도메인별 오버라이드 — 특정 도메인만 다른 경로를 쓰면 여기서 role 단위 교체.
# domains:
#   {domain}:
#     roles:
#       screen: "see adoption-report"

# catalog-gen layout note
# adoption-probe passes this draft layout to catalog-gen with --layout.
# catalog-gen loads project-layout and scans the resolved roles.ui_primitive source.
# If the observed catalog count is 0, treat it as a draft role/source mismatch to inspect,
# not as evidence that catalog-gen ignored project-layout.

# ════════════════════════════════════════════════════════════════════════════
# (Tier3 layers — readiness access wired; hard gates/CI not promoted.)
# access 는 readiness allowed/forbidden paths 에 반영되고 layer-inventory 에 readiness_access_wired / hard_gate_wired 로 표면화된다.
# lint, CI, Open Decision, confirmed 상태와 hard gate 는 바꾸지 않는다.
# ────────────────────────────────────────────────────────────────────────────
layers:
  - role: view_model
    glob: src/presentation/{domain}/viewmodels/**
    fact: dir_has_files
    access:
      allow:
        - rough-fixture-ui
        - final-fixture-ui
      forbid: []
  - role: use_case
    glob: src/domain/{domain}/usecases/**
    fact: dir_has_files
    access:
      allow:
        - rough-fixture-ui
        - final-fixture-ui
      forbid: []
  - role: repository
    glob:
      - src/data/{domain}/repositories/**
      - src/domain/{domain}/repositories/**
    fact: dir_has_files
    access:
      allow:
        - final-fixture-ui
        - api-integrated-ui
      forbid: []
  - role: entity
    glob: src/domain/{domain}/entities/**
    fact: dir_has_files
    access:
      allow:
        - rough-fixture-ui
        - final-fixture-ui
      forbid: []
  - role: data_source
    glob: src/data/{domain}/datasources/**
    fact: dir_has_files
    access:
      allow:
        - api-integrated-ui
      forbid: []
  - role: mapper
    glob: src/data/{domain}/mappers/**
    fact: dir_has_files
    access:
      allow:
        - api-integrated-ui
      forbid: []
