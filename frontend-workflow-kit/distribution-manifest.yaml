version: 1
name: frontend-workflow-kit-consumer-payload
description: >
  Explicit allowlist for the files that are safe and useful to vendor into a
  consumer repository.
destination_hint: tools/frontend-workflow

payload:
  include:
    - path: README.md
      classification: consumer-guide
    - path: COMMANDS.md
      classification: consumer-reference
    - path: CONVENTIONS.md
      classification: consumer-reference
    - path: distribution-manifest.yaml
      classification: consumer-reference
    - path: package.json
      classification: consumer-runtime
    - path: package-lock.json
      classification: consumer-runtime
    - path: package-scripts.template.json
      classification: consumer-template
    - source: ../LICENSE
      target: LICENSE
      classification: notice
    - path: catalog/**
      classification: consumer-runtime
    - path: policies/**
      classification: consumer-runtime
    - path: presets/**
      classification: consumer-runtime
    - path: schemas/**
      classification: consumer-runtime
    - path: scripts/**
      classification: consumer-runtime
    - path: skills/**
      classification: consumer-runtime
    - path: templates/**
      classification: consumer-template
    - path: docs/reference/**
      classification: consumer-reference

# Dev/design/history docs no longer live under the kit — they were moved to the repo-root
# kit-dev/ directory (design drafts, workflow-evolution notes, roadmap-current.md, CHANGELOG.md,
# open-decisions.md, investigation-and-verification.md, and dogfood run reports). Because they
# are physically outside frontend-workflow-kit/ and not in payload.include, they can never be
# packed and need no per-file excludes. The docs/design/**, docs/workflows/**, and temp/**
# entries below are retained only as SAFETY GUARDS: if such a directory is ever re-created under
# the kit, the pack tool still drops it. A kit test (distribution.test.mjs) asserts these
# directories do not physically exist under the kit so they cannot silently reappear.
exclude:
  # --- real excludes: live inside the kit, but are kit-dev tooling/fixtures, not consumer runtime ---
  - path: scripts/pack-frontend-workflow-kit.mjs
    classification: kit-dev-tooling
    reason: kit repo에서만 실행되는 pack/distribution 검증용이며 consumer runtime/gate가 아님.
  - path: scripts/lib/distribution.test.mjs
    classification: kit-dev-test
    reason: kit repo에서만 실행되는 pack/distribution 검증용이며 consumer runtime/gate가 아님.
  - path: examples/**
    classification: kit-dev-fixture
    reason: Golden fixtures and dogfood projects used by kit tests; kept in the kit repo, never vendored.
  - path: "*.html"
    classification: generated-dogfood-output
    reason: Diagnostics are generated explicitly into output dirs when needed.
  # --- safety guards: dev docs moved to repo-root kit-dev/; these directories should NOT exist
  #     under the kit. Retained so a re-created directory can never leak into the payload. ---
  - path: docs/design/**
    classification: design-draft
    reason: 디자인 드래프트는 repo-root kit-dev/docs/design/ 로 이동. guard 로만 유지(킷 안에 재생성되면 제외).
  - path: docs/workflows/**
    classification: kit-dev-history
    reason: 워크플로우 진화 노트는 repo-root kit-dev/docs/workflows/ 로 이동. guard 로만 유지.
  - path: temp/**
    classification: generated-dogfood-output
    reason: dogfood/run-report 산출물은 repo-root kit-dev/temp/ 로 이동. guard 로만 유지(로컬 재생성 dogfood 출력 포함 제외).

classification:
  top_level:
    catalog: consumer-runtime
    policies: consumer-runtime
    presets: consumer-runtime
    schemas: consumer-runtime
    scripts: consumer-runtime
    skills: consumer-runtime
    templates: consumer-template
    package.json: consumer-runtime
    package-lock.json: consumer-runtime
    package-scripts.template.json: consumer-template
    README.md: consumer-guide
    COMMANDS.md: consumer-reference
    CONVENTIONS.md: consumer-reference
    distribution-manifest.yaml: consumer-reference
    docs: consumer-reference          # only docs/reference/ remains under the kit
    examples: kit-dev-fixture
    temp: generated-dogfood-output    # guard only — dev dogfood output lives in repo-root kit-dev/temp/
  paths:
    docs/reference: consumer-reference
    examples: kit-dev-fixture
    temp: generated-dogfood-output
  # Moved OUT of the kit to repo-root kit-dev/ (no longer classified here because they are not
  # under frontend-workflow-kit/): docs/design, docs/workflows, roadmap-current.md, CHANGELOG.md,
  # open-decisions.md, investigation-and-verification.md, and dogfood run reports.
