# Tier1 layout-profile 통합 dogfood 테스트 픽스처 (custom layout).
# expo-feature 프리셋 위에 (a) top-level role 재바인딩과 (b) 도메인별 role 오버라이드를 얹어
# 머지 우선순위(preset < roles < domains.<d>.roles)를 *온-디스크 커밋본*으로 회귀 고정한다.
# 기존 layout-profile.test.mjs 의 MAJOR3/M3 케이스는 tmp 파일이라, 커밋된 fixture 로
# 도메인 오버라이드 해소를 검증하는 게 이 파일의 목적이다.
#
# 소비처: scripts/lib/layout-profile.test.mjs ("custom fixture" 블록).
# 보고서: temp/runs/tier1-integration-dogfood-001.md (§7-1, §8).
# 주의: 이 픽스처는 *프로파일 로더 단위 테스트 입력*일 뿐 — 실제 소스 트리(src/**)는 동반하지 않는다.
version: 1
preset: expo-feature

# preset < roles: route_entry 를 Next-style `app/**` 로 재바인딩(프리셋의 src/app/** 을 role 단위 교체).
# 나머지 role(screen·ui_primitive·api_client …)은 프리셋 값을 그대로 상속한다.
roles:
  route_entry: app/**

# roles < domains.<d>.roles: 'legacy' 도메인만 screen 을 별도 경로로 오버라이드(role 단위 교체).
# 다른 도메인(coupons 등)은 base screen(프리셋)을 그대로 쓴다 — 도메인-스코프 오버라이드 격리 검증용.
domains:
  legacy:
    roles:
      screen: src/legacy/{domain}/screens/**
