# Expo Router + feature-folder preset (tier1 layout profile).
# 현 하드코딩과 BYTE-동치 — 회귀 기준 (tier1-layout-profile.md §8·§10).
# role → 물리 glob. {domain} 토큰은 readiness 의 per-screen 치환에서 펼쳐지므로 여기선 보존한다.
# ({screen} 은 코드 role 에서 치환되지 않는다 — 킷 문서 경로 전용. §2 주의.)
version: 1

roles:
  route_entry: src/app/**
  screen: src/features/{domain}/screens/**
  domain_component: src/features/{domain}/components/**
  hook: src/features/{domain}/hooks/**
  ui_primitive: src/components/ui/**
  api_client: src/api/**
  api_schema: src/api/schemas/**


# Tier3 layer model (no live readiness wiring yet): current role-token policy cells expressed as data.
# This is byte-equivalent to policies/implementation-mode-policy.yaml role-derived allow/forbid cells.
layers:
  - role: route_entry
    fact: dir_has_files
    access:
      allow: [route-skeleton]
      forbid: []
  - role: screen
    fact: dir_has_files
    access:
      allow: [screen-skeleton, rough-fixture-ui, final-fixture-ui]
      forbid: [api-integrated-ui]
  - role: domain_component
    fact: dir_has_files
    access:
      allow: [rough-fixture-ui, final-fixture-ui]
      forbid: []
  - role: hook
    fact: dir_has_files
    access:
      allow: [rough-fixture-ui, api-integrated-ui]
      forbid: []
  - role: api_client
    fact: dir_has_files
    access:
      allow: [api-integrated-ui]
      forbid: [route-skeleton, screen-skeleton, rough-fixture-ui, final-fixture-ui]
