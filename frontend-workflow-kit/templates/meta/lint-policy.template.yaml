# Lint policy source for MVP-B lint-pack.
# Canonical project path: docs/frontend-workflow/_meta/lint-policy.yaml
# Schema: tools/frontend-workflow/schemas/lint-policy.schema.json
#
# MVP-B PR-2 contract:
# - v1 rollout is only "all" or "ratchet"; "new-code-only" is reserved and not valid.
# - baseline is required only when rollout: ratchet, and is forbidden otherwise.
# - disabled policies, severity downgrades, and non-default rollout require reason.
# - safety policy disable/downgrade also requires a human-owned decision reference.
# - lint-gen.mjs emits eslint.workflow.config.mjs as an ESLint flat-config fragment.
# - Existing project parser/languageOptions remain project-owned; do not hand-edit the generated output.

version: 1

defaults:
  paths:
    screens: src/features/*/screens
    api: src/api
    ui: src/components/ui

policies:
  layer-boundaries:
    enabled: true
    severity: error
    rollout: all
    implementation: auto

  no-fetch-in-screens:
    enabled: true
    severity: error
    rollout: all
    implementation: auto

  no-adhoc-buttons:
    enabled: true
    severity: warn
    rollout: all
    implementation: auto

  no-arbitrary-style-values:
    enabled: true
    severity: warn
    rollout: all
    implementation: auto
