# 산출물 레지스트리 — 스킬이 "어떤 문서를 어디에 만들지"를 추론하지 않고 여기서 읽는다.
# 경로는 {domain}, {screen} 플레이스홀더를 사용한다.
# validate.mjs 는 이 레지스트리를 기준으로 누락 frontmatter / 잘못된 경로 / do_not_edit 위반을 검사한다.
#
# MVP-A 등록분 + reconcile-input 산출물 + api-manifest(검사 8 입력)를 포함한다.
# (lint-pack / 그 외 figma 툴링(input·lint·생성뷰) 템플릿은 B~D 단계.
#  단 figma-component-mapping 은 reconcile-input 이 생성하고 readiness 가 status 를 읽으므로 등록하고,
#  api-manifest 는 검사 8(API Candidates↔스키마 매칭)의 canonical 입력이라 등록한다.)
#
# MVP-C Phase 0 하드닝(2026-06-14): 모든 생성물 엔트리에 generated/status 필드를 일관
# 적용하고, 아직 생성기가 없는 planned 산출물도 레지스트리 완전성을 위해 등록한다(구현 아님) —
# route-tree·nav-graph(MVP-C, status: planned), eslint.workflow.config(MVP-B, status: planned).
# 생성물 필드 계약·planned 표기 규칙은 아래 "생성물" 섹션 주석 참고.
# 직접편집 가드(헤더/마커/diff/hook) 설계: temp/proposals/generated-file-guard-followup.md
# 참고: frontend-workflow-kit-implementation.md §4

version: 1

artifacts:
  screen-spec:
    kind: authoring # authoring | generated
    scope: screen # global | app | design | api | domain | screen
    path: docs/frontend-workflow/domains/{domain}/screens/{screen}/screen-spec.md
    template: templates/screen/screen-spec.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - screen_id
      - route
      - status
    generated_sections:
      - { name: entry-points, generator: nav-graph }
    required_for: # readiness gate 연결
      - screen-skeleton
      - rough-fixture-ui

  # 화면별 Figma 시각 매핑 — screen-spec 의 형제 산출물(같은 화면 디렉토리). reconcile-input(figma 입력)이 생성한다.
  # 시각만 담는다(동작은 screen-spec 단일 출처). status 는 readiness 의 figma_mapping_status fact 가 된다
  # (final-fixture-ui 게이트: figma_mapping_status >= draft). route 는 없다(screen-spec 단일 출처).
  figma-component-mapping:
    kind: authoring
    scope: screen
    path: docs/frontend-workflow/domains/{domain}/screens/{screen}/figma-component-mapping.md
    template: templates/screen/figma-component-mapping.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - screen_id
      - status

  navigation-map:
    kind: authoring
    scope: app
    path: docs/frontend-workflow/app/navigation-map.md
    template: templates/app/navigation-map.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  llm-rules:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/llm-rules.md
    template: templates/global/llm-rules.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  # 막힘 기록용 전역 레지스터 — LLM 이 추측 대신 여기에 남긴다 (llm-rules 가 가리킨다).
  # "필요할 때 생성"하는 문서라 항상 존재하지는 않는다. validate 는 존재하는 인스턴스만 검사한다.
  component-gap-register:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/component-gap-register.md
    template: templates/global/component-gap-register.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  conflicts:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/conflicts.md
    template: templates/global/conflicts.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  domain-rules:
    kind: authoring
    scope: domain
    path: docs/frontend-workflow/domains/{domain}/domain-rules.md
    template: templates/domain/domain-rules.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - status

  # 미확정 API 명세의 단일 출처. ScreenSpec ## API Candidates 가 (Method,Path) 로 ## Endpoints 표를 참조하고,
  # validate 검사 8 이 confirmed 후보를 그 행의 Linked Schema(zod export)로 해소한다.
  # "필요할 때 생성"하는 문서라 항상 존재하지는 않는다 — validate 는 존재하는 인스턴스만 검사한다.
  api-manifest:
    kind: authoring
    scope: api
    path: docs/frontend-workflow/api/api-manifest.md
    template: templates/api/api-manifest.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  # --------------------------------------------------------------------------
  # 생성물 (generated / do_not_edit) — 일관 계약 (MVP-C Phase 0 하드닝)
  #
  # 모든 생성물 엔트리는 같은 필드 집합으로 표현한다:
  #   kind: generated        — 산출물 종류 (authoring 의 반대).
  #   generated: true        — 명시적 생성물 플래그. kind:generated 와 의미가 겹치나
  #                            의도를 못박고, 향후 검사가 이 플래그로 분기할 여지를 둔다.
  #                            (현재 validate.mjs 검사 6 의 헤더 검사는 kind+do_not_edit 만 본다.)
  #   do_not_edit: true|false — 직접 편집 금지(true). 생성기만 파일 전체(또는 마커 안)를 교체.
  #                            예외: component-catalog 은 생성기(catalog-gen) active 전까지 false
  #                            (수동 작성 임시 허용) → 생성기 도입 시 true 로 승격.
  #   source: [...]          — 파생 입력(정본). 생성기가 이걸 읽어 산출물을 만든다.
  #   command: npm run ...   — 재생성 명령.
  #   path: ...              — 산출 파일 경로.
  #   status: active|planned — 생성기(command)가 구현됐는가.
  #                            active  = 스크립트 존재·실행 가능.
  #                            planned = 스크립트 미존재. 계약만 등록한 것이지 구현이 아니다.
  #   mvp: <phase>           — 생성기가 속한 단계(A/B/C). 참고 태그.
  #
  # planned 표기 규칙(중요): status: planned 는 "생성기가 아직 없다"는 뜻이지
  # "구현됐다"가 아니다 — planned 산출물을 구현된 것처럼 보이게 하지 않는다.
  # validate.mjs 검사 6 의 헤더 검사(do_not_edit 생성물, validate.mjs:432-443)는 생성 파일이
  # 실제 존재할 때만 헤더를 본다 — 없으면 존재 가드(validate.mjs:438)로 건너뛴다. route-tree·
  # nav-graph·eslint 처럼 do_not_edit:true 인데 파일이 아직 없는 planned 엔트리는 그래서 무해하다.
  # (섹션 마커 검사 validate.mjs:239-258 은 screen-spec 전용이라 이 planned 엔트리들과 무관.)
  # 직접편집 가드의 한계·CI 옵션: temp/proposals/generated-file-guard-followup.md
  # --------------------------------------------------------------------------

  # active — workflow-state.mjs 가 생성. workflow:state 는 package.json 에 존재(MVP-A).
  screen-inventory:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/screen-inventory.yaml
    command: npm run workflow:state
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md
    do_not_edit: true
    status: active
    mvp: A

  workflow-state:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/workflow-state.yaml
    command: npm run workflow:state
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md
    do_not_edit: true
    status: active
    mvp: A

  # planned 생성기 + 임시 수동본 — component-catalog 은 MVP-A 에서 수동 작성을 임시 허용한다.
  # 생성기 catalog-gen.mjs(npm run workflow:catalog)는 미존재(MVP-C) → status: planned.
  # do_not_edit 은 아직 false(수동 편집 허용). 생성기 도입 시 true 로 전환한다.
  # status: planned 는 "생성기 미존재"를 뜻하며, 수동 작성본 파일 자체는 존재할 수 있다.
  component-catalog:
    kind: generated
    generated: true
    scope: design
    path: docs/frontend-workflow/design/component-catalog.md
    command: npm run workflow:catalog # catalog-gen.mjs (MVP-C, 미존재)
    source:
      - src/components/ui/**
    do_not_edit: false # MVP-A: 수동 작성 허용 (생성기 도입 시 true)
    status: planned # catalog-gen.mjs 미구현 — 현재 수동 작성
    mvp: C

  # ── planned 산출물 (생성기 미존재) — Phase 0 등록만, 구현 아님 ──

  # route-tree (MVP-C, View 2) — src/app 파일 트리(Expo Router)에서 라우트 트리를 파생.
  # 생성기 route-tree.mjs 미존재. 교차검증 입력: screen-spec frontmatter.route.
  # 출력 포맷(.txt vs .yaml)은 미해소 Open Decision — impl §9 권장(.txt)으로 등록.
  route-tree:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/route-tree.txt
    command: npm run workflow:route-tree # route-tree.mjs (MVP-C, 미존재)
    source:
      - src/app/** # Expo Router 파일 트리 (정본, impl §9)
    do_not_edit: true
    status: planned
    mvp: C

  # nav-graph (MVP-C, View 1) — 모든 screen-spec 의 ## Interaction Matrix +
  # navigation-map 의 Cross-Domain Edges 에서 내비 그래프를 파생. 생성기 nav-graph.mjs 미존재.
  # 같은 생성기가 각 screen-spec 의 Entry Points GENERATED 블록도 채운다 — 그 인-파일 블록
  # 계약은 screen-spec.generated_sections(entry-points/nav-graph)에 이미 등록돼 있다.
  # 여기선 _meta/nav-graph.yaml 파일 전체(whole-file 헤더) 산출물만 등록한다.
  # 노드/엣지 스키마·크로스도메인 필터는 미해소 Open Decision.
  nav-graph:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/nav-graph.yaml
    command: npm run workflow:nav # nav-graph.mjs (MVP-C, 미존재)
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md # ## Interaction Matrix
      - docs/frontend-workflow/app/navigation-map.md # Cross-Domain Edges
    do_not_edit: true
    status: planned
    mvp: C

  # eslint.workflow.config (MVP-B, lint-pack) — lint-policy 에서 lint-gen.mjs 가 합성.
  # MVP-C 가 아니다. 레지스트리 완전성을 위해 등록만 한다(구현 아님). 생성기 lint-gen.mjs 미존재.
  # 경로가 레포 루트라(docs/frontend-workflow/ 밑이 아님) validate 검사 6 의 경로 해소
  # (docs/frontend-workflow/ 접두 가정: validate.mjs:436)가 이 루트 파일을 못 짚는다 —
  # 이 가드 공백은 generated-file-guard-followup.md 에 정리.
  eslint-workflow-config:
    kind: generated
    generated: true
    scope: app
    path: eslint.workflow.config.mjs
    command: npm run workflow:lint-gen # lint-gen.mjs (MVP-B, 미존재)
    source:
      - lint-policy.yaml # MVP-B 설계 입력 (미확정)
    do_not_edit: true
    status: planned
    mvp: B
