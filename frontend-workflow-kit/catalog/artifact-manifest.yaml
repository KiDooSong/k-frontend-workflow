# 산출물 레지스트리 — 스킬이 "어떤 문서를 어디에 만들지"를 추론하지 않고 여기서 읽는다.
# 경로는 {domain}, {screen} 플레이스홀더를 사용한다.
# validate.mjs 는 이 레지스트리를 기준으로 누락 frontmatter / 잘못된 경로 / do_not_edit 위반을 검사한다.
#
# MVP-A 등록분만 포함한다 (lint-pack / figma / api-manifest 템플릿은 B~D 단계).
# 참고: frontend-workflow-kit-implementation.md §4

version: 1

artifacts:
  screen-spec:
    kind: authoring # authoring | generated
    scope: screen # global | app | design | api | domain | screen
    path: docs/frontend-workflow/domains/{domain}/screens/{screen}/screen-spec.md
    template: templates/screen/screen-spec.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - screen_id
      - route
      - status
    generated_sections:
      - { name: entry-points, generator: nav-graph }
    required_for: # readiness gate 연결
      - screen-skeleton
      - rough-fixture-ui

  navigation-map:
    kind: authoring
    scope: app
    path: docs/frontend-workflow/app/navigation-map.md
    template: templates/app/navigation-map.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  llm-rules:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/llm-rules.md
    template: templates/global/llm-rules.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  domain-rules:
    kind: authoring
    scope: domain
    path: docs/frontend-workflow/domains/{domain}/domain-rules.md
    template: templates/domain/domain-rules.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - status

  # --- 생성물 (do_not_edit) ---
  screen-inventory:
    kind: generated
    scope: global
    path: docs/frontend-workflow/_meta/screen-inventory.yaml
    command: npm run workflow:state
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md
    do_not_edit: true

  workflow-state:
    kind: generated
    scope: global
    path: docs/frontend-workflow/_meta/workflow-state.yaml
    command: npm run workflow:state
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md
    do_not_edit: true

  # MVP-A 임시 허용: component-catalog 은 수동 작성 (catalog-gen 은 MVP-C).
  # 그래서 do_not_edit 을 켜지 않는다. C 단계에서 생성기 도입 시 true 로 전환한다.
  component-catalog:
    kind: generated
    scope: design
    path: docs/frontend-workflow/design/component-catalog.md
    command: npm run workflow:catalog # MVP-C
    source:
      - src/components/ui/**
    do_not_edit: false # MVP-A: 수동 작성 허용
    mvp: C
