# 산출물 레지스트리 — 스킬이 "어떤 문서를 어디에 만들지"를 추론하지 않고 여기서 읽는다.
# 경로는 {domain}, {screen} 플레이스홀더를 사용한다.
# validate.mjs 는 이 레지스트리를 기준으로 누락 frontmatter / 잘못된 경로 / do_not_edit 위반을 검사한다.
#
# MVP-A 등록분 + reconcile-input 산출물 + api-manifest(검사 8 입력)를 포함한다.
# (lint-pack 실행 스크립트와 그 외 figma 툴링(input·lint·생성뷰)은 B~D 단계.
#  단 figma-component-mapping 은 reconcile-input 이 생성하고 readiness 가 status 를 읽으므로 등록하고,
#  api-manifest 는 검사 8(API Candidates↔스키마 매칭)의 canonical 입력이라 등록한다.
#  lint-policy 는 MVP-B PR-1 에서 schema/template/docs-only policy source 로 등록한다.)
#
# MVP-C Phase 0 하드닝(2026-06-14): 모든 생성물 엔트리에 generated/status 필드를 일관
# 적용하고, 아직 생성기가 없는 planned 산출물도 레지스트리 완전성을 위해 등록한다(구현 아님) —
# eslint.workflow.config(MVP-B, status: planned). route-tree·nav-graph(MVP-C)는 Phase 1
# 생성기 구현 완료로 status: active 로 갱신(2026-06-14 통합 점검 — temp/runs/mvp-c-generated-views-integration.md).
# 생성물 필드 계약·planned 표기 규칙은 아래 "생성물" 섹션 주석 참고.
# 직접편집 가드(헤더/마커/diff/hook) 설계: kit-dev/temp/proposals/generated-file-guard-followup.md
# 참고: frontend-workflow-kit-implementation.md §4

version: 1

artifacts:
  screen-spec:
    kind: authoring # authoring | generated
    scope: screen # global | app | design | api | domain | screen
    path: docs/frontend-workflow/domains/{domain}/screens/{screen}/screen-spec.md
    template: templates/screen/screen-spec.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - screen_id
      - route
      - status
    generated_sections:
      - { name: entry-points, generator: nav-graph }
    required_for: # readiness gate 연결
      - screen-skeleton
      - rough-fixture-ui

  # 화면별 Figma 시각 매핑 — screen-spec 의 형제 산출물(같은 화면 디렉토리). reconcile-input(figma 입력)이 생성한다.
  # 시각만 담는다(동작은 screen-spec 단일 출처). status 는 readiness 의 figma_mapping_status fact 가 된다
  # (final-fixture-ui 게이트: figma_mapping_status >= draft). route 는 없다(screen-spec 단일 출처).
  figma-component-mapping:
    kind: authoring
    scope: screen
    path: docs/frontend-workflow/domains/{domain}/screens/{screen}/figma-component-mapping.md
    template: templates/screen/figma-component-mapping.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - screen_id
      - status

  navigation-map:
    kind: authoring
    scope: app
    path: docs/frontend-workflow/app/navigation-map.md
    template: templates/app/navigation-map.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  llm-rules:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/llm-rules.md
    template: templates/global/llm-rules.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  # 막힘 기록용 전역 레지스터 — LLM 이 추측 대신 여기에 남긴다 (llm-rules 가 가리킨다).
  # "필요할 때 생성"하는 문서라 항상 존재하지는 않는다. validate 는 존재하는 인스턴스만 검사한다.
  component-gap-register:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/component-gap-register.md
    template: templates/global/component-gap-register.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  conflicts:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/global/conflicts.md
    template: templates/global/conflicts.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  domain-rules:
    kind: authoring
    scope: domain
    path: docs/frontend-workflow/domains/{domain}/domain-rules.md
    template: templates/domain/domain-rules.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - domain
      - status

  # 미확정 API 명세의 단일 출처. ScreenSpec ## API Candidates 가 (Method,Path) 로 ## Endpoints 표를 참조하고,
  # validate 검사 8 이 confirmed 후보를 그 행의 Linked Schema(zod export)로 해소한다.
  # "필요할 때 생성"하는 문서라 항상 존재하지는 않는다 — validate 는 존재하는 인스턴스만 검사한다.
  api-manifest:
    kind: authoring
    scope: api
    path: docs/frontend-workflow/api/api-manifest.md
    template: templates/api/api-manifest.template.md
    required_frontmatter:
      - artifact_id
      - artifact_type
      - status

  # MVP-B lint-pack 의 canonical human-approved policy source.
  # PR-1 은 schema/template/docs-only 계약을 추가했고, PR-2 는 이 YAML 정책 파일을 읽어
  # eslint.workflow.config.mjs 를 생성하는 lint-gen.mjs skeleton 을 runnable 하게 만들었다.
  # PR-3/MR #55 는 brownfield scan/propose 스킬(adapt-lint-pack)을 추가했고, PR-4 는
  # lint-baseline.mjs warning-first ratchet runner 를 runnable 하게 만들었다. 다만
  # validate/CI 는 이 스키마를 아직 강제하지 않고, CI gate 도 미승격 상태다.
  lint-policy:
    kind: authoring
    scope: global
    path: docs/frontend-workflow/_meta/lint-policy.yaml
    template: templates/meta/lint-policy.template.yaml
    schema: schemas/lint-policy.schema.json

  # --------------------------------------------------------------------------
  # 생성물 (generated / do_not_edit) — 일관 계약 (MVP-C Phase 0 하드닝)
  #
  # 모든 생성물 엔트리는 같은 필드 집합으로 표현한다:
  #   kind: generated        — 산출물 종류 (authoring 의 반대).
  #   generated: true        — 명시적 생성물 플래그. kind:generated 와 의미가 겹치나
  #                            의도를 못박고, 향후 검사가 이 플래그로 분기할 여지를 둔다.
  #                            (현재 validate.mjs 검사 6 의 헤더 검사는 kind+do_not_edit 만 본다.)
  #   do_not_edit: true|false — 직접 편집 금지(true). 생성기만 파일 전체(또는 마커 안)를 교체.
  #   source: [...]          — 파생 입력(정본). 생성기가 이걸 읽어 산출물을 만든다.
  #   command: npm run ...   — 재생성 명령.
  #   path: ...              — 산출 파일 경로.
  #   outputs: [...]         — codegen 전용 다중 산출물 표현. 기존 단일 path 계약을 깨지
  #                            않기 위해 일반 생성물은 path 를 유지하고, codegen artifact 만
  #                            하나의 artifact 아래 outputs[] 로 여러 파일 패턴을 나열한다.
  #                            generated ownership 은 "manifest-listed outputs + GENERATED
  #                            header/marker" 의 교집합이다. 따라서 같은 hook 경로에 있는
  #                            사람이 쓴 파일(헤더 없음)은 stale output 으로 보지 않는다.
  #   status: active|planned — 생성기(command)가 구현됐는가.
  #                            active  = 스크립트 존재·실행 가능.
  #                            planned = 스크립트 미존재. 계약만 등록한 것이지 구현이 아니다.
  #   mvp: <phase>           — 생성기가 속한 단계(A/B/C). 참고 태그.
  #
  # planned 표기 규칙(중요): status: planned 는 "생성기가 아직 없다"는 뜻이지
  # "구현됐다"가 아니다 — planned 산출물을 구현된 것처럼 보이게 하지 않는다.
  # validate.mjs 검사 6 의 헤더 검사(do_not_edit 생성물, validate.mjs:432-443)는 생성 파일이
  # 실제 존재할 때만 헤더를 본다 — 없으면 존재 가드(validate.mjs:438)로 건너뛴다. route-tree·
  # nav-graph·eslint 처럼 do_not_edit:true 인데 파일이 아직 없는 planned 엔트리는 그래서 무해하다.
  # (섹션 마커 검사 validate.mjs:239-258 은 screen-spec 전용이라 이 planned 엔트리들과 무관.)
  # 직접편집 가드의 한계·CI 옵션: kit-dev/temp/proposals/generated-file-guard-followup.md
  # --------------------------------------------------------------------------

  # active — workflow-state.mjs 가 생성. workflow:state 는 package.json 에 존재(MVP-A).
  screen-inventory:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/screen-inventory.yaml
    command: npm run workflow:state
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md
    do_not_edit: true
    status: active
    mvp: A

  workflow-state:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/workflow-state.yaml
    command: npm run workflow:state
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md
    do_not_edit: true
    status: active
    mvp: A

  # conditional — workflow-state.mjs writes this when project-layout.yaml declares layer telemetry.
  # It is still generated/do_not_edit; absence is expected for repos that use the default layer model.
  layer-inventory:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/layer-inventory.yaml
    command: npm run workflow:state
    source:
      - project-layout.yaml
      - "{roles.*}"
    do_not_edit: true
    status: active
    mvp: A

  # component-catalog (MVP-C, View 3) — src/components/ui/** 파일 트리에서 컴포넌트 카탈로그를 파생.
  # 생성기 catalog-gen.mjs 구현 완료 + 출력 포맷 v1 freeze(골든). 4필드 Markdown 표:
  # name/source-path/export-kind/status. 골든 픽스처: examples/component-catalog/basic-ui.
  component-catalog:
    kind: generated
    generated: true
    scope: design
    path: docs/frontend-workflow/design/component-catalog.md
    command: npm run workflow:catalog # catalog-gen.mjs (MVP-C)
    source:
      - "{roles.ui_primitive}"
    do_not_edit: true
    status: active
    mvp: C

  # ── MVP-C Phase 1 생성 뷰 — route-tree · nav-graph (생성기 구현 완료 → status: active) ──

  # route-tree (MVP-C, View 2) — src/app 파일 트리(Expo Router)에서 라우트 트리를 파생.
  # 생성기 route-tree.mjs 구현 완료(Phase 1). 교차검증 입력: screen-spec frontmatter.route.
  # 출력 포맷 .txt 로 구현(impl §9 권장). 골든 픽스처: examples/route-tree/{basic-app,edge-cases}.
  route-tree:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/route-tree.txt
    command: npm run workflow:route-tree # route-tree.mjs (MVP-C)
    source:
      - "{roles.route_entry}" # Expo Router 파일 트리 (role-token source, impl §9)
    do_not_edit: true
    status: active
    mvp: C

  # nav-graph (MVP-C, View 1) — 모든 screen-spec 의 ## Interaction Matrix +
  # navigation-map 의 Cross-Domain Edges 에서 내비 그래프를 파생. 생성기 nav-graph.mjs 구현 완료(Phase 1).
  # 같은 생성기가 각 screen-spec 의 Entry Points GENERATED 블록도 채운다 — 그 인-파일 블록
  # 계약은 screen-spec.generated_sections(entry-points/nav-graph)에 이미 등록돼 있다.
  # 여기선 _meta/nav-graph.yaml 파일 전체(whole-file 헤더) 산출물만 등록한다.
  # 노드/엣지 스키마·크로스도메인 필터는 미해소 Open Decision.
  nav-graph:
    kind: generated
    generated: true
    scope: global
    path: docs/frontend-workflow/_meta/nav-graph.yaml
    command: npm run workflow:nav-graph # nav-graph.mjs (MVP-C)
    source:
      - docs/frontend-workflow/domains/**/screen-spec.md # ## Interaction Matrix
      - docs/frontend-workflow/app/navigation-map.md # Cross-Domain Edges
    do_not_edit: true
    status: active
    mvp: C

  # codegen-openapi-client (Tier2 codegen) — OpenAPI schema 에서 deterministic TS client/hook
  # 파일들을 파생한다. 단일 path artifact 가 아니라 하나의 artifact 가 outputs[] 로 다중
  # 산출물을 표현한다(OD-6 결정). 출력 경로는 새 api_generated role 없이 기존 roles.api_client
  # / roles.hook 표면을 쓴다(OD-5 결정). hook 은 domain-scoped 경로를 유지한다(OD-7 결정).
  # check-generated-files 의 focused advisory target 만 소비한다. validate/readiness/nav-graph 는
  # codegen adapter 를 직접 소비하지 않으며, CI/hard gate/required check/--enforce 승격도 없다.
  codegen-openapi-client:
    kind: generated
    generated: true
    scope: api
    outputs:
      - path: src/api/generated/*.client.ts
        role: api_client
      - path: src/features/{domain}/hooks/*.ts
        role: hook
    command: node scripts/check-generated-files.mjs --artifact codegen-openapi-client --src examples/codegen-adapter/openapi-client/src
    source:
      - "{roles.api_schema}"
    do_not_edit: true
    status: active
    mvp: C
    guard: focused-advisory

  # eslint.workflow.config (MVP-B, lint-pack) — docs/frontend-workflow/_meta/lint-policy.yaml 에서
  # lint-gen.mjs 가 합성.
  # MVP-C 가 아니다. PR-2 에서 lint-gen skeleton/package script 는 runnable 이지만,
  # repo-root generated guard 승격은 아직 후속이므로 레지스트리에서는 generated artifact 를
  # planned 로 유지한다. 즉 "생성 명령 존재"와 "guard-enforced artifact"를 분리한다.
  # 경로가 레포 루트라(docs/frontend-workflow/ 밑이 아님) validate 검사 6 의 경로 해소
  # (docs/frontend-workflow/ 접두 가정: validate.mjs:436)가 이 루트 파일을 못 짚는다 —
  # 이 가드 공백은 kit-dev/temp/proposals/generated-file-guard-followup.md 에 정리.
  # JS 생성 파일 배너 문구는 docs/workflows/lint-policy-catalog.md 에 문서화되어 있고,
  # lint-gen.mjs 가 그대로 emit 한다.
  # status: planned 이므로 파일 부재는 must-not-fail 이며, check-generated/CI 가 아직 이 루트
  # 파일을 재생성/비교하지 않는다.
  eslint-workflow-config:
    kind: generated
    generated: true
    scope: app
    path: eslint.workflow.config.mjs
    command: npm run workflow:lint-gen # lint-gen.mjs (MVP-B PR-2 skeleton)
    source:
      - docs/frontend-workflow/_meta/lint-policy.yaml # MVP-B canonical policy source
    do_not_edit: true
    status: planned
    mvp: B
